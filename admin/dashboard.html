<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard — Admin</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="logo">Photo Frame Maker<small>Admin</small></div>
            <nav>
                <a href="/admin/dashboard.html" class="active">대시보드</a>
                <a href="/admin/posts.html">글 관리</a>
                <a href="/admin/editor.html">새 글 작성</a>
                <a href="/admin/settings.html">사이트 설정</a>
                <a href="/blog/" target="_blank">블로그 보기</a>
                <a href="/" target="_blank">사이트 보기</a>
                <a href="#" id="logout-btn">로그아웃</a>
            </nav>
        </aside>
        <main class="admin-main">
            <h1>대시보드</h1>
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card"><div class="label">전체 글</div><div class="value" id="stat-total">-</div></div>
                <div class="stat-card"><div class="label">발행됨</div><div class="value" id="stat-published">-</div></div>
                <div class="stat-card"><div class="label">임시저장</div><div class="value" id="stat-drafts">-</div></div>
                <div class="stat-card"><div class="label">총 조회수</div><div class="value" id="stat-views">-</div></div>
            </div>
            <h2 style="font-size:1rem;margin-bottom:1rem;">최근 글</h2>
            <table class="post-table" id="recent-posts">
                <thead><tr><th>제목</th><th>상태</th><th>조회수</th><th>수정일</th></tr></thead>
                <tbody id="recent-tbody"></tbody>
            </table>
        </main>
    </div>
    <script>
        (async () => {
            const check = await fetch('/api/auth/check');
            const { authenticated } = await check.json();
            if (!authenticated) { window.location.href = '/admin/login.html'; return; }

            const res = await fetch('/api/admin/stats');
            if (!res.ok) { window.location.href = '/admin/login.html'; return; }
            const stats = await res.json();

            document.getElementById('stat-total').textContent = stats.totalPosts;
            document.getElementById('stat-published').textContent = stats.published;
            document.getElementById('stat-drafts').textContent = stats.drafts;
            document.getElementById('stat-views').textContent = stats.totalViews.toLocaleString();

            const tbody = document.getElementById('recent-tbody');
            if (stats.recentPosts.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-secondary);padding:2rem;">아직 작성된 글이 없습니다</td></tr>';
            } else {
                tbody.innerHTML = stats.recentPosts.map(p => `
                    <tr>
                        <td><a href="/admin/editor.html?id=${p.id}" style="color:var(--text);text-decoration:none;">${p.title || '(제목 없음)'}</a></td>
                        <td><span class="status-badge ${p.status}">${p.status === 'published' ? '발행' : '임시저장'}</span></td>
                        <td>${p.view_count}</td>
                        <td>${p.updated_at ? p.updated_at.slice(0, 10) : ''}</td>
                    </tr>`).join('');
            }

            document.getElementById('logout-btn').addEventListener('click', async (e) => {
                e.preventDefault();
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/admin/login.html';
            });
        })();
    </script>
</body>
</html>
