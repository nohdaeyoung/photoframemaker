<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>사이트 설정 — Admin</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="logo">Photo Frame Maker<small>Admin</small></div>
            <nav>
                <a href="/admin/dashboard.html">대시보드</a>
                <a href="/admin/posts.html">글 관리</a>
                <a href="/admin/editor.html">새 글 작성</a>
                <a href="/admin/settings.html" class="active">사이트 설정</a>
                <a href="/blog/" target="_blank">블로그 보기</a>
                <a href="/" target="_blank">사이트 보기</a>
                <a href="#" id="logout-btn">로그아웃</a>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="toolbar">
                <h1 style="margin:0">사이트 설정</h1>
                <button class="btn btn-primary" onclick="saveSettings()">저장</button>
            </div>

            <div class="settings-section">
                <h2>기본 정보</h2>
                <div class="editor-form">
                    <div class="form-group">
                        <label>사이트 타이틀</label>
                        <input type="text" id="site_title" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>사이트 설명</label>
                        <input type="text" id="site_description" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>키워드</label>
                        <input type="text" id="site_keywords" class="form-input">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>작성자 이름</label>
                            <input type="text" id="site_author" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>사이트 URL</label>
                            <input type="text" id="site_url" class="form-input">
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h2>블로그 설정</h2>
                <div class="editor-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>블로그 타이틀</label>
                            <input type="text" id="blog_title" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>페이지당 글 수</label>
                            <input type="number" id="posts_per_page" class="form-input" min="1" max="50">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>블로그 설명</label>
                        <input type="text" id="blog_description" class="form-input">
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h2>SEO / 소셜</h2>
                <div class="editor-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>파비콘 <small style="color:var(--text-secondary)">(ICO·PNG·SVG)</small></label>
                            <div class="setting-upload-group">
                                <input type="hidden" id="favicon_url">
                                <div class="setting-upload-preview favicon-preview" id="favicon_preview"></div>
                                <label class="btn btn-secondary" style="cursor:pointer;font-size:0.8rem">
                                    파일 업로드
                                    <input type="file" accept=".ico,.png,.svg,image/x-icon,image/png,image/svg+xml" style="display:none" onchange="uploadSettingFile(this,'favicon_url','favicon_preview')">
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>기본 OG 이미지 <small style="color:var(--text-secondary)">(1200×630 권장)</small></label>
                            <div class="setting-upload-group">
                                <input type="hidden" id="og_default_image">
                                <div class="setting-upload-preview og-preview" id="og_image_preview"></div>
                                <label class="btn btn-secondary" style="cursor:pointer;font-size:0.8rem">
                                    파일 업로드
                                    <input type="file" accept="image/*" style="display:none" onchange="uploadSettingFile(this,'og_default_image','og_image_preview')">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <h2>애널리틱스</h2>
                <div class="editor-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Google Analytics ID</label>
                            <input type="text" id="ga_id" class="form-input" placeholder="G-XXXXXXXXXX">
                        </div>
                        <div class="form-group">
                            <label>GTM ID</label>
                            <input type="text" id="gtm_id" class="form-input" placeholder="GTM-XXXXXXXX">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        const settingKeys = ['site_title', 'site_description', 'site_keywords', 'site_author', 'site_url', 'blog_title', 'blog_description', 'posts_per_page', 'og_default_image', 'favicon_url', 'ga_id', 'gtm_id'];

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'admin-toast';
            t.textContent = msg;
            document.body.appendChild(t);
            requestAnimationFrame(() => t.classList.add('show'));
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 2000);
        }

        async function uploadSettingFile(input, settingKey, previewId) {
            const file = input.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            showToast('업로드 중...');
            const res = await fetch('/api/admin/upload', { method: 'POST', body: formData });
            if (!res.ok) { showToast('업로드 실패'); return; }
            const { url } = await res.json();
            document.getElementById(settingKey).value = url;
            const preview = document.getElementById(previewId);
            preview.innerHTML = `<img src="${url}" alt="preview" style="max-width:100%;max-height:60px;border-radius:4px;">`;
            showToast('업로드 완료 — 저장 버튼을 눌러 적용하세요');
        }

        async function loadSettings() {
            const res = await fetch('/api/admin/settings');
            if (!res.ok) return;
            const data = await res.json();
            for (const key of settingKeys) {
                const el = document.getElementById(key);
                if (el && data[key] !== undefined) el.value = data[key];
            }
            if (data.favicon_url) {
                document.getElementById('favicon_preview').innerHTML = `<img src="${data.favicon_url}" alt="favicon" style="max-width:100%;max-height:60px;border-radius:4px;">`;
            }
            if (data.og_default_image) {
                document.getElementById('og_image_preview').innerHTML = `<img src="${data.og_default_image}" alt="og image" style="max-width:100%;max-height:60px;border-radius:4px;">`;
            }
        }

        async function saveSettings() {
            const data = {};
            for (const key of settingKeys) {
                const el = document.getElementById(key);
                if (el) data[key] = el.value;
            }
            const res = await fetch('/api/admin/settings', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            showToast(res.ok ? '설정이 저장되었습니다' : '저장에 실패했습니다');
        }

        (async () => {
            const check = await fetch('/api/auth/check');
            const { authenticated } = await check.json();
            if (!authenticated) { window.location.href = '/admin/login.html'; return; }
            await loadSettings();

            document.getElementById('logout-btn').addEventListener('click', async (e) => {
                e.preventDefault();
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/admin/login.html';
            });
        })();
    </script>
</body>
</html>
