<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login — Photo Frame Maker</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="admin-login">
        <div class="login-card">
            <h1>Photo Frame Maker</h1>
            <p>관리자 로그인</p>
            <form id="login-form">
                <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" required>
                <button type="submit">로그인</button>
                <div id="error" class="login-error" style="display:none"></div>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                if (res.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    errEl.textContent = '비밀번호가 올바르지 않습니다';
                    errEl.style.display = 'block';
                }
            } catch {
                errEl.textContent = '서버 연결에 실패했습니다';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
